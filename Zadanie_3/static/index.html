<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MachineAssist · Strojný asistent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:    #0a0a0a;
      --panel:    #111111;
      --surface:  #181818;
      --border:   #2a2a2a;
      --border-hi:#3d3d3d;
      --amber:    #f59e0b;
      --amber-dim: rgba(245,158,11,.10);
      --green:    #22c55e;
      --red:      #ef4444;
      --text:     #e5e5e5;
      --muted:    #6b6b6b;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    html, body { height: 100%; }

    body {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      background: var(--black);
      color: var(--text);
      font-family: var(--sans);
    }

    /* HEADER */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .hdr-left { display: flex; align-items: center; gap: 10px; }

    .logo-mark {
      width: 26px; height: 26px;
      border: 2px solid var(--amber);
      display: grid;
      place-items: center;
    }
    .logo-mark::before {
      content: '';
      width: 9px; height: 9px;
      border: 2px solid var(--amber);
      transform: rotate(45deg);
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--amber);
      text-transform: uppercase;
    }

    .hdr-center {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-align: center;
    }

    .hdr-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 6px var(--amber);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .status-dot.ok    { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.error { background: var(--red);   box-shadow: 0 0 6px var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .35; }
    }

    .status-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* CHAT */
    main {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,.016) 39px, rgba(255,255,255,.016) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.016) 39px, rgba(255,255,255,.016) 40px);
    }

    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #chat-log::-webkit-scrollbar { width: 3px; }
    #chat-log::-webkit-scrollbar-thumb { background: var(--border-hi); }

    .msg-row {
      display: flex;
      align-items: flex-start;
      padding: 9px 28px;
      gap: 12px;
      animation: fadeUp .2s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }

    .msg-row.agent {
      border-left: 2px solid var(--amber);
      background: linear-gradient(90deg, var(--amber-dim), transparent 50%);
    }
    .msg-row.user  { justify-content: flex-end; }
    .msg-row.system { justify-content: center; }

    .avatar {
      width: 28px; height: 28px; flex-shrink: 0;
      border: 1px solid var(--border-hi);
      display: grid; place-items: center;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--amber);
      margin-top: 1px;
    }
    .avatar.you { color: var(--muted); }

    .bubble { max-width: 700px; }

    .bubble-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: .05em;
    }

    .bubble-text {
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .bubble-text {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      padding: 8px 14px;
    }

    .msg-row.system .bubble-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      border: 1px dashed var(--border-hi);
      padding: 5px 12px;
    }

    /* thinking */
    .dot-anim {
      display: inline-block;
      width: 5px; height: 5px;
      background: var(--amber);
      border-radius: 50%;
      margin-right: 4px;
      animation: blink 1.1s ease-in-out infinite;
    }
    .dot-anim:nth-child(2) { animation-delay: .18s; }
    .dot-anim:nth-child(3) { animation-delay: .36s; }

    @keyframes blink {
      0%,80%,100% { opacity:.2; transform:scale(.8); }
      40% { opacity:1; transform:scale(1); }
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      background: var(--panel);
    }

    .quick-strip {
      padding: 12px 24px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .q-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      width: 100%;
      letter-spacing: .08em;
      margin-bottom: 2px;
    }

    .quick-btn {
      font-family: var(--mono);
      font-size: 11px;
      color: #888;
      background: transparent;
      border: 1px solid var(--border);
      padding: 5px 11px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: color .13s, border-color .13s, background .13s;
    }
    .quick-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-dim);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      padding: 12px 24px 16px;
      gap: 0;
    }

    .input-prefix {
      font-family: var(--mono);
      font-size: 16px;
      color: var(--amber);
      padding-right: 10px;
      user-select: none;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-hi);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 6px 0;
      outline: none;
      transition: border-color .15s;
    }
    #chat-input:focus { border-bottom-color: var(--amber); }
    #chat-input::placeholder { color: var(--muted); }

    #send-btn {
      margin-left: 16px;
      background: transparent;
      border: 1px solid var(--amber);
      color: var(--amber);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      padding: 7px 18px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background .13s, color .13s;
      flex-shrink: 0;
    }
    #send-btn:hover    { background: var(--amber); color: var(--black); }
    #send-btn:disabled { opacity: .3; cursor: default; background: transparent; color: var(--amber); }

    @media (max-width: 600px) {
      .hdr-center { display: none; }
      .msg-row { padding: 8px 14px; }
      .quick-strip, .input-wrap { padding-left: 14px; padding-right: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="hdr-left">
    <div class="logo-mark"></div>
    <span class="logo-text">MachineAssist</span>
  </div>
  <div class="hdr-center">PLAN-EXECUTE AGENT · LNK-01 · POSTGRES · CHROMA · MCP</div>
  <div class="hdr-right">
    <div id="status-dot" class="status-dot"></div>
    <span id="status-label" class="status-label">connecting…</span>
  </div>
</header>

<main>
  <div id="chat-log">
    <div class="msg-row system">
      <div class="bubble">
        <div class="bubble-text">Agent online · responses in English · POST /chat</div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="quick-strip">
    <div class="q-label">// PREDEFINED QUERIES</div>
    <button class="quick-btn" data-q="What was the average machine temperature for LNK-01 in the last 8 hours?">AVG TEMP LNK-01 (8h)</button>
    <button class="quick-btn" data-q="What does the SOP say about alarm E204?">SOP → E204</button>
    <button class="quick-btn" data-q="What does the SOP say about alarm E221?">SOP → E221</button>
    <button class="quick-btn" data-q="Was alarm E204 associated with a change in spindle speed? If yes, when was it last observed?">E204 &amp; SPINDLE SPEED</button>
    <button class="quick-btn" data-q="Remember that I prefer concise answers.">PREFERENCE: CONCISE</button>
    <button class="quick-btn" data-q="What did I tell you about my preferences?">RECALL PREFERENCES</button>
    <button class="quick-btn" data-q="Find technical information about Siemens SIMATIC MICROBOX PC and summarize compatibility.">SIEMENS SIMATIC MICROBOX PC</button>
  </div>
  <div class="input-wrap">
    <span class="input-prefix">›</span>
    <input id="chat-input" type="text" placeholder="Enter query…" autocomplete="off" />
    <button id="send-btn">SEND ↵</button>
  </div>
</footer>

<script>
  const log   = document.getElementById('chat-log');
  const input = document.getElementById('chat-input');
  const btn   = document.getElementById('send-btn');
  const dot   = document.getElementById('status-dot');
  const lbl   = document.getElementById('status-label');

  function setStatus(state, text) {
    dot.className = 'status-dot' + (state === 'ok' ? ' ok' : state === 'error' ? ' error' : '');
    lbl.textContent = text;
  }

  function ts() {
    return new Date().toLocaleTimeString('sk', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addMsg(role, text) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    if (role === 'agent') {
      row.innerHTML = `
        <div class="avatar">AGT</div>
        <div class="bubble">
          <div class="bubble-meta">${ts()}</div>
          <div class="bubble-text">${esc(text)}</div>
        </div>`;
    } else if (role === 'user') {
      row.innerHTML = `
        <div class="bubble">
          <div class="bubble-meta">${ts()}</div>
          <div class="bubble-text">${esc(text)}</div>
        </div>
        <div class="avatar you">YOU</div>`;
    } else {
      row.innerHTML = `<div class="bubble"><div class="bubble-text">${esc(text)}</div></div>`;
    }

    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    return row;
  }

  function addThinking() {
    const row = document.createElement('div');
    row.className = 'msg-row agent';
    row.innerHTML = `
      <div class="avatar">AGT</div>
      <div class="bubble">
        <div class="bubble-text">
          <span class="dot-anim"></span>
          <span class="dot-anim"></span>
          <span class="dot-anim"></span>
        </div>
      </div>`;
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    return row;
  }

  async function send(q) {
    q = q.trim();
    if (!q) return;
    addMsg('user', q);
    input.value = '';
    btn.disabled = true;
    const thinking = addThinking();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: q }),
      });
      thinking.remove();
      if (!res.ok) {
        const t = await res.text();
        addMsg('system', `HTTP ${res.status}: ${t || 'no body'}`);
        setStatus('error', 'error ' + res.status);
        return;
      }
      const data = await res.json();
      addMsg('agent', data.answer || '(no answer)');
      setStatus('ok', 'ready');
    } catch(e) {
      thinking.remove();
      addMsg('system', 'Network error: ' + e.message);
      setStatus('error', 'offline');
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  btn.addEventListener('click', () => send(input.value));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
  });
  document.querySelectorAll('.quick-btn').forEach(b => {
    b.addEventListener('click', () => send(b.dataset.q));
  });

  // health check
  (async () => {
    try {
      const r = await fetch('/health');
      const d = await r.json();
      setStatus(d?.status === 'ok' ? 'ok' : 'error', d?.status === 'ok' ? 'ready' : 'unexpected response');
    } catch { setStatus('error', 'offline'); }
  })();
</script>
</body>
</html>
